    <circle cx="180" cy="65"  r="18" fill="#0b2341" />
    <circle cx="60"  cy="130" r="18" fill="#0b2341" />
    <circle cx="300" cy="130" r="18" fill="#0b2341" />
    <circle cx="80"  cy="242" r="18" fill="#0b2341" />
    <circle cx="280" cy="242" r="18" fill="#0b2341" />
    <circle cx="180" cy="185" r="17" fill="#007a8c" />

    <path d="M 30,285 L 172,366 L 172,398 L 30,317 Z" fill="url(#tealGrad)" />
    <path d="M 188,366 L 330,285 L 330,317 L 188,398 Z" fill="url(#tealGrad)" />
    <path d="M 30,238 L 172,319 L 172,351 L 30,270 Z" fill="url(#tealGrad)" />
